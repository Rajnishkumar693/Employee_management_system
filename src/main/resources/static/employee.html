<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Employee Management System</h1>

<form id="employeeForm">

    <input type="text"
           id="name"
           placeholder="Employee Name"
           required>

    <input type="text"
           id="department"
           placeholder="Department"
           required>

    <input type="email"
           id="email"
           placeholder="Email"
           required>

    <input type="number"
           id="salary"
           placeholder="Salary"
           required>

    <button type="submit">
        Add Employee
    </button>

</form>

<hr>

<h2>Employee List</h2>

<table border="1">

<thead>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Department</th>
    <th>Email</th>
    <th>Salary</th>
</tr>
</thead>

<tbody id="employeeTable">

</tbody>

</table>

<script src="/employee.js"></script>

</body>
</html>
