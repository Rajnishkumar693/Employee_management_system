
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-4">
        <h1 class="fw-bold text-primary">
            Employee Management System
        </h1>

        <p class="text-muted">
            Spring Boot + JavaScript CRUD Application
        </p>
    </div>

    <!-- Employee Form -->
    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">
            Add New Employee
        </div>

        <div class="card-body">

            <form id="employeeForm">

                <div class="row g-3">

                    <div class="col-md-3">
                        <input type="text"
                               id="name"
                               class="form-control"
                               placeholder="Employee Name"
                               required>
                    </div>

                    <div class="col-md-3">
                        <input type="text"
                               id="department"
                               class="form-control"
                               placeholder="Department"
                               required>
                    </div>

                    <div class="col-md-3">
                        <input type="email"
                               id="email"
                               class="form-control"
                               placeholder="Email"
                               required>
                    </div>

                    <div class="col-md-2">
                        <input type="number"
                               id="salary"
                               class="form-control"
                               placeholder="Salary"
                               required>
                    </div>

                    <div class="col-md-1">
                        <button type="submit"
                                class="btn btn-success w-100">
                            Add
                        </button>
                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- Dashboard Card -->
    <div class="row mt-4">

        <div class="col-md-4">

            <div class="card shadow border-0">

                <div class="card-body text-center">

                    <h5>Total Employees</h5>

                    <h2 id="totalEmployees"
                        class="text-primary">
                        0
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <!-- Employee Table -->
    <div class="card shadow border-0 mt-4">

        <div class="card-header bg-dark text-white">
            Employee List
        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover table-striped">

                    <thead class="table-dark">

                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Email</th>
                            <th>Salary</th>
                            <th>Action</th>
                        </tr>

                    </thead>

                    <tbody id="employeeTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="/employee.js"></script>

</body>
</html>
